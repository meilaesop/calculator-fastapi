name: Python CI Pipeline

# 1. 触发条件：当 main 分支有 git push 时，启动这条流水线
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 2. 运行环境：让 GitHub 给你分配一台最新的 Ubuntu 虚拟服务器
    runs-on: ubuntu-latest

    steps:
    # 3. 步骤一：拉取你仓库里的最新代码到这台虚拟机上
    - name: Checkout code
      uses: actions/checkout@v4

    # 4. 步骤二：在虚拟机上安装并配置 Python 3.11 环境
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 5. 步骤三：利用缓存或直接安装你项目所需的第三方依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 6. 步骤四：运行自动化检查（这里用 Python 自带的 compileall 检查有没有语法错误）
    - name: Check Python syntax errors
      run: |
        python -m compileall .

